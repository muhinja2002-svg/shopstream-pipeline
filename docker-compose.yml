version: '3.8'

services:

  # ── Redpanda Broker ────────────────────────────────────────────────────────
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --advertise-kafka-addr localhost:9092
    ports:
      - "9092:9092"    # Kafka API (used by producer.py / consumer.py)
      - "9644:9644"    # Redpanda Admin API
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ── Redpanda Console (UI) ──────────────────────────────────────────────────
  # Access the web UI at http://localhost:8080
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    depends_on:
      redpanda:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - KAFKA_BROKERS=redpanda:9092

  # ── Topic Initialisation ───────────────────────────────────────────────────
  # Runs once to create the topic with sensible defaults, then exits.
  topic-init:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: |
      "rpk topic create ecommerce_events \
        --brokers redpanda:9092 \
        --partitions 3 \
        --replicas 1 \
        --topic-config retention.ms=86400000"
    restart: "no"
