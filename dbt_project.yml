name: 'shopstream_transform'
version: '1.0.0'
config-version: 2

profile: 'shopstream_profile'

model-paths:  ["models"]
test-paths:   ["tests"]
seed-paths:   ["seeds"]
macro-paths:  ["macros"]
analysis-paths: ["analyses"]

target-path:  "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  shopstream_transform:
    staging:
      +materialized: view      # Staging models are lightweight views
      +schema: staging
    marts:
      +materialized: table     # Mart models are materialised as tables for query speed
